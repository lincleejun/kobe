# Release pipeline.
#
# Trigger: pushing a `vX.Y.Z` tag (semver only — no `v0.1.0-rc.1` etc.;
# add a separate prerelease workflow if/when we need one).
#
# Steps, in order:
#   1. Sanity gates — typecheck, test, build. If any fail the release
#      stops before any side-effect (npm publish, GitHub release).
#   2. Verify the tag's version matches package.json. Cuts off the
#      "I forgot to bump package.json" footgun.
#   3. Extract the matching CHANGELOG section as the release body.
#      If the section is missing we fall back to a placeholder rather
#      than failing — better to ship + amend than to block on docs.
#   4. `npm publish --provenance`. The provenance flag uses the
#      OIDC token (granted by `id-token: write` below) to attach
#      build attestation to the published tarball — surfaces in the
#      npm UI as "this build came from this CI run on this commit".
#   5. Create the GitHub release with the extracted notes. Attach the
#      built `dist/index.js` so users who don't want npm can grab the
#      binary directly.
#
# Required repo secrets:
#   - NPM_TOKEN: an npm automation token (Settings → Access Tokens
#     → Generate New Token → Automation). Must have publish rights
#     on the @sma1lboy scope.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

# Default permissions are set to read-only for security; the publish
# job re-grants only what it actually needs.
permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for creating the GitHub release
      id-token: write   # for npm provenance (OIDC)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the release notes / future tooling can
          # reach back if needed.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        # Behavior tests are intentionally skipped here — they need tmux,
        # bun-PTY, and a real `claude` binary on PATH, none of which are
        # reliable in GitHub-hosted runners. Run them locally with
        # `bun run test:behavior` before cutting a tag.
        working-directory: packages/kobe
        run: bun x vitest run test/cli test/tui test/types test/orchestrator test/engine test/state --passWithNoTests

      - name: Build
        run: bun run build

      - name: Verify tag matches package.json
        working-directory: packages/kobe
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag $TAG_VERSION does not match packages/kobe/package.json version $PKG_VERSION"
            echo "Bump packages/kobe/package.json before tagging, or retag after bumping."
            exit 1
          fi
          echo "tag and packages/kobe/package.json agree on $PKG_VERSION"

      - name: Extract changelog section
        id: changelog
        working-directory: packages/kobe
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Pull everything between `## [<version>]` and the next `## [`.
          # awk is happier than sed for this multi-line slice.
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\["ver"\\]" { found=1; next }
            found && $0 ~ "^## \\[" { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$(echo "$NOTES" | tr -d '[:space:]')" ]; then
            NOTES="See [CHANGELOG.md](./packages/kobe/CHANGELOG.md) for details."
          fi
          {
            echo 'notes<<CHANGELOG_EOF'
            echo "$NOTES"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        # Workspaces hoist deps to root; `npm publish` still runs
        # against the package's own dir.
        working-directory: packages/kobe
        run: npm publish --access public --provenance

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: packages/kobe/dist/index.js
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
